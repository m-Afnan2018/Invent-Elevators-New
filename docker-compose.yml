services:
    mongodb:
        image: mongo:7
        container_name: mongodb
        restart: always
        ports:
            - "27017:27017"
        volumes:
            - mongo-data:/data/db
        environment:
            MONGO_INITDB_ROOT_USERNAME: admin
            MONGO_INITDB_ROOT_PASSWORD: strongpassword

    backend:
        image: mafnan2018/invent-elevators-server:latest # ← pulled from Docker Hub, not built
        container_name: mern-backend
        restart: always
        ports:
            - "5000:5000"
        env_file:
            - ./server/.env
        depends_on:
            - mongodb
        dns:
            - 8.8.8.8
            - 1.1.1.1

    frontend:
        image: mafnan2018/invent-elevators-client:latest # ← pulled from Docker Hub, not built
        container_name: mern-frontend
        restart: always
        ports:
            - "3000:3000"
        depends_on:
            - backend
        dns:
            - 8.8.8.8
            - 1.1.1.1

volumes:
    mongo-data:

