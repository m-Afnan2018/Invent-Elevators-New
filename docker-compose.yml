version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: mern-backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: mern-frontend
    restart: always
    ports:
      - "3000:80"