version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: strongpassword
  backend:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: mern-backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: mern-frontend
    restart: always
    ports:
      - "3000:80"